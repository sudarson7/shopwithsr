<html>

</nav>
    <meta charset="UTF-8">
    <title>ShopwithSR</title>

    <!-- Browser Tab Logo -->
    <link rel="icon" type="image/png" href="image/logo.png">

    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<header>

    <div class="logo">
        <img src="image/logo.png" alt="ShopwithSR Logo">
        <h1>ShopwithSR</h1>
    </div>

    <div>
        <a href="login.html" id="userLink">Login</a>
        <a href="wishlist.html">❤️ Wishlist</a>
        <a href="cart.html">🛒 Cart</a>
    </div>

</header>

<h2>Categories</h2>

<div class="categories">

    <div onclick="location.href='products.html?category=clothing'">
        👕 Clothing
    </div>

    <div onclick="location.href='products.html?category=vegetables'">
        🥕 Fruits & Vegetables
    </div>

    <div onclick="location.href='products.html?category=mobile'">
        📱 Mobile Accessories
    </div>

    <div onclick="location.href='products.html?category=home'">
        🏠 Home Appliances
    </div>

</div>

<script>
let user = JSON.parse(localStorage.getItem("loggedUser"));

if (user) {

    let userLink = document.getElementById("userLink");

    userLink.innerHTML = "Welcome, " + user.name + " (Logout)";

    userLink.href = "#";

    userLink.onclick = function () {
        localStorage.removeItem("loggedUser");
        alert("Logged Out Successfully");
        window.location.href = "login.html";
    };
}
</script>

</body>
</html>
