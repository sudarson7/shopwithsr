    <meta charset="UTF-8">
    <title>Login</title>
</head>
<body>

<h2>Login</h2>

<input id="email" type="email" placeholder="Enter Gmail">
<br><br>

<input id="pass" type="password" placeholder="Password">
<br><br>

<button onclick="login()">Login</button>

<hr>

<h2>Register</h2>

<input id="nameR" placeholder="Name">
<br><br>

<input id="emailR" type="email" placeholder="Enter Gmail">
<br><br>

<input id="passR" type="password" placeholder="Password">
<br><br>

<button onclick="register()">Register</button>

<script>
function register() {
    let name = document.getElementById("nameR").value.trim();
    let email = document.getElementById("emailR").value.trim();
    let password = document.getElementById("passR").value;

    if (name === "" || email === "" || password === "") {
        alert("Please fill all fields");
        return;
    }

    let gmailPattern = /^[a-zA-Z0-9._%+-]+@gmail\.com$/;

    if (!gmailPattern.test(email)) {
        alert("Please enter a valid Gmail address");
        return;
    }

    if (password.length < 6) {
        alert("Password must be at least 6 characters");
        return;
    }

    let users = JSON.parse(localStorage.getItem("users")) || [];

    let exists = users.find(u => u.email === email);

    if (exists) {
        alert("User already exists");
        return;
    }

    users.push({
        name: name,
        email: email,
        password: password
    });

    localStorage.setItem("users", JSON.stringify(users));

    alert("Registration Successful");

    document.getElementById("nameR").value = "";
    document.getElementById("emailR").value = "";
    document.getElementById("passR").value = "";
}

function login() {
    let email = document.getElementById("email").value.trim();
    let password = document.getElementById("pass").value;

    if (email === "" || password === "") {
        alert("Please enter email and password");
        return;
    }

    let users = JSON.parse(localStorage.getItem("users")) || [];

    let user = users.find(
        u => u.email === email && u.password === password
    );

    if (!user) {
        alert("Invalid Email or Password");
        return;
    }

    localStorage.setItem("loggedUser", JSON.stringify(user));

    alert("Login Successful");

    window.location.replace("index.html");
}

function logout() {
    localStorage.removeItem("loggedUser");
    window.location.replace("login.html");
}
</script>

</body>
</html>
