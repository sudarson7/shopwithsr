<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Login</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #2874f0, #6a11cb);
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
}

.container {
    background: white;
    padding: 30px;
    width: 320px;
    border-radius: 12px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.2);
    text-align: center;
}

h2 {
    margin-bottom: 20px;
    color: #333;
}

input {
    width: 100%;
    padding: 12px;
    margin: 10px 0;
    border: 1px solid #ccc;
    border-radius: 8px;
    outline: none;
    transition: 0.2s;
}

input:focus {
    border-color: #2874f0;
    box-shadow: 0 0 5px rgba(40,116,240,0.4);
}

button {
    width: 100%;
    padding: 12px;
    margin-top: 10px;
    border: none;
    border-radius: 8px;
    background: #2874f0;
    color: white;
    font-size: 16px;
    cursor: pointer;
}

button:hover {
    background: #0b5ed7;
}

.register {
    margin-top: 15px;
    font-size: 14px;
    color: #555;
}

.register a {
    color: #2874f0;
    text-decoration: none;
}
</style>

</head>
<body>

<div class="container">

    <h2>Login</h2>

    <input type="email" id="email" placeholder="Enter Email">
    <input type="password" id="password" placeholder="Enter Password">

    <button onclick="login()">Login</button>

    <div class="register">
        Don't have an account? <a href="#" onclick="showRegister()">Register</a>
    </div>

</div>

<script>
function login() {
    let email = document.getElementById("email").value;
    let pass = document.getElementById("password").value;

    let user = JSON.parse(localStorage.getItem("user"));

    if (!email || !pass) {
        alert("Fill all fields");
        return;
    }

    if (user && user.email === email && user.password === pass) {
        localStorage.setItem("loggedUser", JSON.stringify(user));
        alert("Login successful");
        window.location.href = "products.html";
    } else {
        alert("Invalid credentials");
    }
}

function showRegister() {
    alert("Create a simple register page or I can build it for you next 👍");
}
</script>

</body>
</html>
