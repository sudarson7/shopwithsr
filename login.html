<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ShopwithSR Login</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
}

body{
    background:#f1f3f6;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

.container{
    width:850px;
    min-height:500px;
    background:#fff;
    display:flex;
    border-radius:12px;
    overflow:hidden;
    box-shadow:0 10px 30px rgba(0,0,0,0.15);
}

.left{
    width:40%;
    background:#2874f0;
    color:white;
    padding:40px 30px;
}

.left h1{
    margin-bottom:20px;
    font-size:32px;
}

.left p{
    line-height:1.8;
    font-size:16px;
}

.right{
    width:60%;
    padding:40px;
    display:flex;
    justify-content:center;
    align-items:center;
}

.form-box{
    width:100%;
}

.form-box h2{
    margin-bottom:20px;
    color:#333;
}

.input-group{
    position:relative;
}

input{
    width:100%;
    padding:12px;
    margin:10px 0;
    border:1px solid #ccc;
    border-radius:6px;
    outline:none;
}

input:focus{
    border-color:#2874f0;
}



.options{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-top:10px;
    font-size:14px;
}

.options a{
    color:#2874f0;
    text-decoration:none;
}

button{
    width:100%;
    padding:12px;
    margin-top:20px;
    border:none;
    border-radius:6px;
    background:#fb641b;
    color:white;
    font-size:16px;
    cursor:pointer;
}

button:hover{
    background:#e85d04;
}

.link{
    text-align:center;
    margin-top:15px;
}

.link a{
    color:#2874f0;
    cursor:pointer;
    text-decoration:none;
}

#registerForm{
    display:none;
}

@media(max-width:768px){

.container{
    width:95%;
    flex-direction:column;
}

.left,
.right{
    width:100%;
}

.left{
    text-align:center;
}

}

</style>
</head>
<body>

<div class="container">

<div class="left">
    <h1>Welcome Back!</h1>
    <p>
        Login to access your Cart,
        Wishlist, Orders and exclusive offers.
    </p>
</div>

<div class="right">

    <!-- LOGIN -->

    <div class="form-box" id="loginForm">

        <h2>Login</h2>

        <input type="email"
               id="loginEmail"
               placeholder="Enter Email">

        <div class="input-group">
            <input type="password"
                   id="loginPassword"
                   placeholder="Enter Password">

        
        </div>

        <div class="options">

         <label>
    <input type="checkbox" id="rememberMe">
    Remember Me
</label>

           <a href="#" onclick="forgotPassword()">Forgot Password?</a>

        </div>

        <button onclick="login()">
            Login
        </button>

        <div class="link">
            New User?
            <a onclick="showRegister()">
                Create Account
            </a>
        </div>

    </div>

    <!-- REGISTER -->

    <div class="form-box" id="registerForm">

        <h2>Create Account</h2>

        <input type="text"
               id="name"
               placeholder="Full Name">

        <input type="email"
               id="regEmail"
               placeholder="Email Address">

        <div class="input-group">
            <input type="password"
                   id="regPassword"
                   placeholder="Password">
        </div>

        <button onclick="register()">
            Register
        </button>

        <div class="link">
            Already have an account?
            <a onclick="showLogin()">
                Login
            </a>
        </div>

    </div>

</div>
</div>

<script>

function showRegister(){

    document.getElementById("loginForm").style.display="none";
    document.getElementById("registerForm").style.display="block";
}

function showLogin(){

    document.getElementById("registerForm").style.display="none";
    document.getElementById("loginForm").style.display="block";
}

function togglePassword(id){

    let field=document.getElementById(id);

    if(field.type==="password"){
        field.type="text";
    }
    else{
        field.type="password";
    }
}
    function forgotPassword(){

    let email = prompt("Enter your registered email");

    let user = JSON.parse(localStorage.getItem("user"));

    if(user && user.email === email){

        let newPassword = prompt("Enter new password");

        if(newPassword){

            user.password = newPassword;

            localStorage.setItem(
                "user",
                JSON.stringify(user)
            );

            alert("Password Reset Successful");
        }

    }else{

        alert("Email not found");
    }
}

function register(){

    let name=document.getElementById("name").value.trim();
    let email=document.getElementById("regEmail").value.trim();
    let password=document.getElementById("regPassword").value.trim();

    if(!name || !email || !password){

        alert("Please fill all fields");
        return;
    }

    let emailPattern=/^[^ ]+@[^ ]+\.[a-z]{2,3}$/;

    if(!email.match(emailPattern)){

        alert("Enter valid email");
        return;
    }

    if(password.length<6){

        alert("Password must be at least 6 characters");
        return;
    }

   let existingUser =
    JSON.parse(localStorage.getItem("user"));

if(existingUser &&
   existingUser.email === email){

    alert("Email already registered");
    return;
}

let user = {
    name:name,
    email:email,
    password:password
};

let users =
JSON.parse(localStorage.getItem("users")) || [];

users.push(user);

localStorage.setItem(
    "users",
    JSON.stringify(users)
);

    alert("Registration Successful");

    showLogin();
}

function login(){

    let email =
    document.getElementById("loginEmail").value.trim();

    let password =
    document.getElementById("loginPassword").value.trim();

    let users =
    JSON.parse(localStorage.getItem("users")) || [];

    let user = users.find(
        u => u.email === email &&
             u.password === password
    );

    if(!user){
        alert("Invalid Email or Password");
        return;
    }

    localStorage.setItem(
        "loggedUser",
        JSON.stringify(user)
    );

    alert("Welcome " + user.name + "!");
    window.location.href = "products.html";
}
</script>

</body>
</html>
